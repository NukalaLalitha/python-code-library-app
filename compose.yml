---
services:
  db:
    image: manilallidevops/pythonapp:dbimage
    ports:
      - "3306:3306"
    deploy:
      replicas: 3
  auth_service:
    image: manilallidevops/pythonapp:authimage
    ports:
      - "5001:5001"
    deploy:
      replicas: 3
    depends_on:
      - db
  book_service:
    image: manilallidevops/pythonapp:bookimage
    ports:
      - "5002:5002"
    deploy:
      replicas: 3
    depends_on:
      - db
  borrow_service:
    image: manilallidevops/pythonapp:borrowimage
    ports:
      - "5003:5003"
    deploy:
      replicas: 3
    depends_on:
      - db
  app_service:
    image: manilallidevops/pythonapp:appimage
    ports:
      - "5000:5000"
    deploy:
      replicas: 3
    depends_on:
      - auth_service
      - book_service
      - borrow_service
